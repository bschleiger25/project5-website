version: 0.2

phases:
  install:
    commands:
      - echo "Install phase - nothing to install for static site"

  pre_build:
    commands:
      - echo "Pre-build phase - starting"

  build:
    commands:
      - echo "Build phase - no build needed for static site"

  post_build:
    commands:
      - echo "Post-build phase - creating CloudFront invalidation"
      - aws cloudfront create-invalidation --distribution-id E1PDDXSXKZD93B --paths "/*"
      - echo "Invalidation submitted"

artifacts:
  files:
    - '**/*'
  base-directory: .
